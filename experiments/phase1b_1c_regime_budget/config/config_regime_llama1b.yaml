# config_regime_llama1b.yaml — Part 1b 追補 A2（図3 ユニバーサリティ第三系列）Llama-3.2 1B
# ★ 実行は事前登録 A1.3 のゲート成立時のみ（Gemma と同一ゲートに従属。analyze_regime.py が判定を出力する）
# プロンプト・温度・max_tokens・seed 方式は Qwen/Gemma 系と完全に固定（交絡遮断）
base_url: http://localhost:8000/v1
model: meta-llama/Llama-3.2-1B-Instruct
temperature: 0.7
max_tokens: 1024
subset: experiments/phase1b_1c_regime_budget/data/gsm8k_subset_regime.jsonl
outdir: experiments/phase1b_1c_regime_budget/results/llama1b
concurrency: 8

seeds: [1, 2, 3]

grid:
    - { n: 1, r: 0 }   # 床
    - { n: 3, r: 0 }   # self-consistency
    - { n: 3, r: 2 }   # 討論
