# config.yaml — Phase 1 実験定義
base_url: http://localhost:8000/v1
model: Qwen/Qwen2.5-7B-Instruct
temperature: 0.7
max_tokens: 512
subset: data/gsm8k_subset.jsonl
outdir: results
concurrency: 8

seeds: [1, 2, 3]

# (N, R) の実験マトリクス（§1.1 の2スライス）
grid:
    - { n: 3, r: 0 } # ← R曲線（N=3固定）。r0 は temp0.7 の3票多数決＝小型 self-consistency
    - { n: 3, r: 1 }
    - { n: 3, r: 2 } # ← 原論文の主構成（3体×2ラウンド）
    - { n: 3, r: 3 }
    - { n: 1, r: 2 } # ← N曲線（R=2固定）。n1 は自己リフレクション
    - { n: 2, r: 2 }
    - { n: 4, r: 2 }
    - { n: 6, r: 2 }
    - { n: 1, r: 0 } # ← 同一温度での床（N=1, R=0, temp=0.7）
