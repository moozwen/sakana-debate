# config_regime_3b.yaml — Part 1b（レジーム同定）3B。事前登録 §3 参照
# プロンプト・温度・max_tokens・seed 方式は Phase 1 と完全に固定（交絡遮断）
base_url: http://localhost:8000/v1
model: Qwen/Qwen2.5-3B-Instruct
temperature: 0.7
max_tokens: 1024
subset: data/gsm8k_subset_regime.jsonl
outdir: results_regime/3b
concurrency: 8

seeds: [1, 2, 3]

# 最小マトリクス: 床 / SC / 討論のみ（N曲線は gate 後追補。事前登録 §6-1）
grid:
    - { n: 1, r: 0 }   # 床
    - { n: 3, r: 0 }   # self-consistency
    - { n: 3, r: 2 }   # 討論（原論文主構成）
